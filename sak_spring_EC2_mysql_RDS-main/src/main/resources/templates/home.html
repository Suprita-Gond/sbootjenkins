<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suprita Store</title>
</head>

<body>

<section>

    <!-- Hero Section -->
    <div class="container-fluid bg-dark text-white py-5">
        <div class="container text-center">

            <h1 class="display-3 fw-bold">
                Welcome to Suprita's Store
            </h1>

            <p class="lead mt-3">
                Online Shopping Made Simple
            </p>

            <a href="#products" class="btn btn-warning btn-lg mt-3">
                Explore Products
            </a>

        </div>
    </div>


    <!-- Carousel -->

    <div id="carouselExample" class="carousel slide mt-4" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30"
                     class="d-block w-100"
                     style="height:500px; object-fit:cover;">
            </div>

            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f"
                     class="d-block w-100"
                     style="height:500px; object-fit:cover;">
            </div>

            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e"
                     class="d-block w-100"
                     style="height:500px; object-fit:cover;">
            </div>

        </div>

        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#carouselExample"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <button class="carousel-control-next"
                type="button"
                data-bs-target="#carouselExample"
                data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>



    <!-- Products -->

    <div class="container py-5" id="products">

        <div class="text-center mb-5">

            <h2 class="fw-bold">Our Products</h2>

            <p class="text-muted">
                Browse our latest collection
            </p>

        </div>

        <div class="row">

            <div class="col-md-4 mb-4"
                 th:each="product : ${products}">

                <div class="card h-100 shadow border-0">

                    <img th:if="${product.base64Image}"
                         th:src="'data:image/jpeg;base64,' + ${product.base64Image}"
                         class="card-img-top"
                         style="height:250px; object-fit:cover;">

                    <div class="card-body text-center">

                        <h4 class="fw-bold"
                            th:text="${product.productName}">
                            Product Name
                        </h4>

                        <p class="text-muted"
                           th:text="${product.productDescription}">
                            Description
                        </p>

                        <h5 class="text-success fw-bold"
                            th:text="'₹ ' + ${product.price}">
                            ₹0
                        </h5>

                        <button class="btn btn-primary mt-3">
                            Buy Now
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <!-- Features -->

    <div class="container py-5">

        <div class="row text-center">

            <div class="col-md-4">

                <h2>🚚</h2>

                <h4>Fast Delivery</h4>

                <p>Delivery across India</p>

            </div>

            <div class="col-md-4">

                <h2>💳</h2>

                <h4>Secure Payment</h4>

                <p>100% Safe Payment Gateway</p>

            </div>

            <div class="col-md-4">

                <h2>⭐</h2>

                <h4>Quality Products</h4>

                <p>Best Quality Guaranteed</p>

            </div>

        </div>

    </div>

</section>

</body>

</html>
